
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Controller</title>
    <style>
        body {
            /* Adapted from simon.py body */
            background-color: #f0f0f0;
            display: flex;
            flex-direction: row;
            align-items: stretch;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            gap: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* --- LEFT CONTAINER - Hidden but exists in DOM --- */
        .left-container {
            width: 0;
            height: 0;
            overflow: visible;
            flex-shrink: 0;
        }

        /* Wrapper to handle absolute positioning of the button over the image */
        .image-wrapper {
            position: fixed;
            display: inline-block;
            text-align: center;
            z-index: 1000;
            left: 0;
            top: 0;
            will-change: transform;
            transition: opacity 0.2s ease;
            min-width: 100px;
            min-height: 100px;
            cursor: grab;
            border: 2px solid #999;
            border-radius: 4px;
        }
        
        .image-wrapper.dragging {
            opacity: 0.7;
            cursor: grabbing;
        }
        
        .image-wrapper.resizing {
            opacity: 0.9;
        }
        
        body.dragging iframe,
        body.resizing iframe {
            pointer-events: none;
        }
        
        .resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #444;
            border-radius: 50%;
            bottom: -6px;
            right: -6px;
            z-index: 10;
            cursor: nwse-resize;
            transition: all 0.2s ease;
        }
        
        .resize-handle:hover {
            background: rgba(74, 144, 226, 0.9);
            transform: scale(1.2);
        }

        .status-image {
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: auto;
            display: block;
            border: 0px solid #999;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            object-fit: contain;
            pointer-events: auto;
        }

        /* --- ELLIPTIC BUTTON CONFIGURATION --- */
        .elliptic-btn {
            /* Positioning Logic */
            position: absolute;
            top: 62.2%;
            left: 72%;
            transform: translate(-50%, -50%);
            z-index: 10;
            margin: 0;

            /* Visual Logic */
            background-color: transparent;
            width: 26.6px;
            height: 39.2px; 
            border-radius: 50%;
            border: none;
            outline: none; /* Prevents focus rings in some browsers */
            font-size: 0; /* Hides the "Toggle" text if you don't want it visible */
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: none; /* Removed the shadow to make it truly invisible */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .elliptic-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
            background-color: transparent;
        }

        /* --- RIGHT CONTAINER (Adapted to match iframe style in simon.py) --- */
        .right-container {
            flex-grow: 1; 
            min-width: 0; 
            height: 100vh;
            border: none;
            border-radius: 0;
            background-color: #fff;
            box-shadow: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 6px; /* Inner radius matching container */
        }
    </style>
</head>

        // DOM Elements
        const engineFrame = document.getElementById('engineFrame');
        const lampImage = document.getElementById('lampImage');
        const ctrlButton = document.getElementById('ctrlButton');

        // --- INITIALIZATION ---
        window.addEventListener('load', () => {
            ypi.frame.setPlayerId(engineFrame, PLAYER_ID);
            engineFrame.onload = function() {
                ypi.frame.setPlayerId(engineFrame, PLAYER_ID);
            };
        });

        // --- SENDER (Button Click) ---
        ctrlButton.addEventListener('mousedown', () => {
            console.log("Sending: button.pressed");
            if(engineFrame) ypi.frame.raise(engineFrame, 'button.pressed');
        });

        // --- RECEIVER (Iframe Updates) ---
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data || !data.cmd) return;

            // Debugging
            if(data.cmd === 'valueChanged') {
                // FIX: ypi.js uses data.varId and normalizes to Upper Case.
                // We must do the same to match 'LIGHT_ON'.
                const rawName = data.varId || data.varName || data.name || '';
                const varName = rawName.replace('.', '_').toUpperCase();

                console.log(`Received Update: ${varName} = ${data.value}`);

                // LOGIC: If LIGHT is true -> Show ON Image, else OFF Image
                // We check if the varName *contains* LIGHT_ON to be safe against prefixes
                if (varName.includes('LIGHT_ON')) {
                    if (data.value === true || data.value === 'true') {
                        lampImage.src = IMG_ON;
                    } else {
                        lampImage.src = IMG_OFF;
                    }
                }
            }
        });

        // --- DRAGGING FUNCTIONALITY WITH BOUNDARY CONSTRAINTS ---
        const imageWrapper = document.querySelector('.image-wrapper');
        const iframe = document.getElementById('engineFrame');
        const resizeHandle = document.querySelector('.resize-handle');
        
        let isDragging = false;
        let isResizing = false;
        let currentX = 0;
        let currentY = 0;
        let initialX = 0;
        let initialY = 0;
        let xOffset = 0;
        let yOffset = 0;
        let initialWidth = 400;
        let initialHeight = 250;
        let animationFrameId = null;
        const aspectRatio = 400 / 250; // Fixed aspect ratio

        // Set initial size
        imageWrapper.style.width = initialWidth + 'px';

        // Position image at top-right of iframe with 5px margin
        window.addEventListener('load', () => {
            const iframeRect = iframe.getBoundingClientRect();
            const wrapperRect = imageWrapper.getBoundingClientRect();
            imageWrapper.style.left = (iframeRect.right - wrapperRect.width - 5) + 'px';
            imageWrapper.style.top = (iframeRect.top + 5) + 'px';
        });

        // Only allow dragging from the image
        lampImage.addEventListener('mousedown', dragStart);
        lampImage.addEventListener('touchstart', dragStart, { passive: false });
        
        // Resize handle
        resizeHandle.addEventListener('mousedown', resizeStart);
        resizeHandle.addEventListener('touchstart', resizeStart, { passive: false });
        
        // Global event listeners
        document.addEventListener('mousemove', handleMove, { passive: false });
        document.addEventListener('touchmove', handleMove, { passive: false });
        document.addEventListener('mouseup', handleEnd);
        document.addEventListener('touchend', handleEnd);
        
        // Safety net for when pointer leaves window
        window.addEventListener('blur', handleEnd);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                handleEnd({});
            }
        });

        function dragStart(e) {
            e.preventDefault();
            e.stopPropagation();
            
            if (e.type === 'touchstart') {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }

            isDragging = true;
            imageWrapper.classList.add('dragging');
            document.body.classList.add('dragging');
        }
        
        function resizeStart(e) {
            e.preventDefault();
            e.stopPropagation();
            
            isResizing = true;
            imageWrapper.classList.add('resizing');
            document.body.classList.add('resizing');
            
            // Capture pointer to ensure we keep receiving events
            if (e.target.setPointerCapture && e.pointerId !== undefined) {
                e.target.setPointerCapture(e.pointerId);
            }
            
            const rect = imageWrapper.getBoundingClientRect();
            initialWidth = rect.width;
            initialHeight = rect.height;
            
            if (e.type === 'touchstart') {
                initialX = e.touches[0].clientX;
                initialY = e.touches[0].clientY;
            } else {
                initialX = e.clientX;
                initialY = e.clientY;
            }
        }

        function handleMove(e) {
            if (!isDragging && !isResizing) return;
            
            e.preventDefault();
            e.stopPropagation();
            
            if (isDragging) {
                let clientX, clientY;
                if (e.type === 'touchmove') {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                let newX = clientX - initialX;
                let newY = clientY - initialY;

                // Apply boundaries
                const iframeRect = iframe.getBoundingClientRect();
                const rect = imageWrapper.getBoundingClientRect();
                
                // Calculate where the wrapper would be with new offset
                const futureLeft = rect.left - xOffset + newX;
                const futureTop = rect.top - yOffset + newY;
                const futureRight = futureLeft + rect.width;
                const futureBottom = futureTop + rect.height;

                // Constrain to iframe boundaries
                if (futureLeft < iframeRect.left) {
                    newX = iframeRect.left - (rect.left - xOffset);
                }
                if (futureRight > iframeRect.right) {
                    newX = iframeRect.right - rect.width - (rect.left - xOffset);
                }
                if (futureTop < iframeRect.top) {
                    newY = iframeRect.top - (rect.top - yOffset);
                }
                if (futureBottom > iframeRect.bottom) {
                    newY = iframeRect.bottom - rect.height - (rect.top - yOffset);
                }

                currentX = newX;
                currentY = newY;
                xOffset = newX;
                yOffset = newY;

                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                }
                animationFrameId = requestAnimationFrame(() => {
                    setTranslate(newX, newY, imageWrapper);
                    animationFrameId = null;
                });
            } else if (isResizing) {
                let clientX, clientY;
                if (e.type === 'touchmove') {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                const deltaX = clientX - initialX;
                
                let newWidth = Math.max(200, Math.min(800, initialWidth + deltaX)); // 50% to 200% of original 400px
                let newHeight = newWidth / aspectRatio;

                // Check if resize would exceed iframe bounds
                const iframeRect = iframe.getBoundingClientRect();
                const rect = imageWrapper.getBoundingClientRect();
                
                // Calculate maximum width/height based on current position
                const maxWidthRight = iframeRect.right - rect.left;
                const maxHeightBottom = iframeRect.bottom - rect.top;
                const maxWidthFromHeight = maxHeightBottom * aspectRatio;
                
                // Constrain to iframe boundaries
                newWidth = Math.min(newWidth, maxWidthRight, maxWidthFromHeight);
                newHeight = newWidth / aspectRatio;

                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                }
                animationFrameId = requestAnimationFrame(() => {
                    imageWrapper.style.width = newWidth + 'px';
                    animationFrameId = null;
                });
            }
        }

        function handleEnd(e) {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            
            if (isDragging) {
                initialX = currentX;
                initialY = currentY;
                isDragging = false;
                imageWrapper.classList.remove('dragging');
                document.body.classList.remove('dragging');
            }
            if (isResizing) {
                // Release pointer capture
                if (resizeHandle.releasePointerCapture && e.pointerId !== undefined) {
                    try {
                        resizeHandle.releasePointerCapture(e.pointerId);
                    } catch (err) {
                        // Ignore errors if capture wasn't set
                    }
                }
                isResizing = false;
                imageWrapper.classList.remove('resizing');
                document.body.classList.remove('resizing');
            }
        }

        function setTranslate(xPos, yPos, el) {
            el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`;
        }
